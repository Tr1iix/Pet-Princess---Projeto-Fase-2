  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-9">
        <div class="card shadow-lg border-0">
          <div class="card-body p-4 p-md-5">
            <h1 class="text-center mb-4">Cadastro do Cliente e do Pet</h1>

            <form id="formCadastro" novalidate>
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="nomeCliente" class="form-label">Nome do cliente</label>
                  <input type="text" class="form-control" id="nomeCliente" placeholder="Digite seu nome completo" required>
                </div>

                <div class="col-md-6">
                  <label for="cpf" class="form-label">CPF</label>
                  <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" required>
                </div>

                <div class="col-12">
                  <label for="endereco" class="form-label">Endereço</label>
                  <input type="text" class="form-control" id="endereco" placeholder="Rua, número e bairro" required>
                </div>

                <div class="col-md-4">
                  <label for="sexo" class="form-label">Sexo</label>
                  <select class="form-select" id="sexo" required>
                    <option value="">Selecione</option>
                    <option>Feminino</option>
                    <option>Masculino</option>
                    <option>Prefiro não informar</option>
                  </select>
                </div>

                <div class="col-md-4">
                  <label for="telefone" class="form-label">Telefone</label>
                  <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000" required>
                </div>

                <div class="col-md-4">
                  <label for="email" class="form-label">E-mail</label>
                  <input type="email" class="form-control" id="email" placeholder="email@exemplo.com" required>
                </div>

                <div class="col-md-4">
                  <label for="nomePet" class="form-label">Nome do pet</label>
                  <input type="text" class="form-control" id="nomePet" placeholder="Nome do pet" required>
                </div>

                <div class="col-md-4">
                  <label for="racaPet" class="form-label">Raça</label>
                  <input type="text" class="form-control" id="racaPet" placeholder="Raça do pet" required>
                </div>

                <div class="col-md-4">
                  <label for="idadePet" class="form-label">Idade do pet</label>
                  <input type="number" class="form-control" id="idadePet" min="0" max="30" placeholder="Idade em anos" required>
                </div>

                <div class="col-12">
                  <label class="form-label d-block">Porte do pet</label>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="portePet" id="portePequeno" value="Pequeno" required>
                    <label class="form-check-label" for="portePequeno">Pequeno</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="portePet" id="porteMedio" value="Médio">
                    <label class="form-check-label" for="porteMedio">Médio</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="portePet" id="porteGrande" value="Grande">
                    <label class="form-check-label" for="porteGrande">Grande</label>
                  </div>
                </div>

                <div class="col-12">
                  <label class="form-label d-block">Observações adicionais</label>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="alergia">
                    <label class="form-check-label" for="alergia">Pet possui alergia</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="idoso">
                    <label class="form-check-label" for="idoso">Pet idoso</label>
                  </div>
                </div>
              </div>

              <div class="text-center mt-4">
                <button type="submit" class="btn btn-pet btn-lg px-4">Cadastrar</button>
              </div>
            </form>

            <div id="mensagemCadastro" class="mt-4"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
