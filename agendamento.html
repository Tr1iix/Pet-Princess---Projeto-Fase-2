</a>

        <span class="navbar-toggler-icon"></span>
      </button>

        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>

        </ul>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-lg border-0">
          <div class="card-body p-4 p-md-5">
            <h1 class="text-center mb-4">Agendamento de Serviços</h1>

            <form id="formAgendamento" novalidate>
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="clienteAgenda" class="form-label">Nome do cliente</label>
                  <input type="text" class="form-control" id="clienteAgenda" placeholder="Nome do responsável" required>
                </div>

                <div class="col-md-6">
                  <label for="petAgenda" class="form-label">Nome do pet</label>
                  <input type="text" class="form-control" id="petAgenda" placeholder="Nome do pet" required>
                </div>

                <div class="col-md-6">
                  <label for="servico" class="form-label">Serviço</label>
                  <select class="form-select" id="servico" required>
                    <option value="">Selecione o serviço</option>
                    <option>Banho</option>
                    <option>Tosa</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label for="metodo" class="form-label">Método de atendimento</label>
                  <select class="form-select" id="metodo" required>
                    <option value="">Selecione o método</option>
                    <option>Tele-busca</option>
                    <option>Entrega no local</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label for="dataAgendamento" class="form-label">Data</label>
                  <input type="date" class="form-control" id="dataAgendamento" required>
                </div>

                <div class="col-md-6">
                  <label for="horaAgendamento" class="form-label">Horário</label>
                  <input type="time" class="form-control" id="horaAgendamento" required>
                </div>
              </div>

              <div class="text-center mt-4">
                <button type="submit" class="btn btn-pet btn-lg px-4">Agendar</button>
              </div>
            </form>

            <div id="mensagemAgendamento" class="mt-4"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer-pet text-white py-4 mt-5">
    <div class="container text-center">

    </div>
